services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aitown
      POSTGRES_USER: aitown
      POSTGRES_PASSWORD: aitown_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitown"]
      interval: 2s
      timeout: 5s
      retries: 10

  game-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://aitown:aitown_dev@db:5432/aitown
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/test:/app/test
      - ./server/vitest.config.ts:/app/vitest.config.ts
      - ./data:/app/data

volumes:
  pgdata:
