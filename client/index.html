<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Town</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #game-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 16px;
    }
    #game-canvas { cursor: pointer; }
    #debug-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: #9fb0d1;
      padding: 8px 10px;
      background: #0f3460;
      border: 1px solid #533483;
      border-radius: 4px;
    }
    .debug-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .debug-toggle input {
      accent-color: #e94560;
    }
    #sidebar {
      width: 320px;
      background: #16213e;
      border-left: 2px solid #0f3460;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      overflow-y: auto;
    }
    #sidebar h2 {
      color: #e94560;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #join-section { display: flex; gap: 8px; }
    #join-section input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #533483;
      color: #e0e0e0;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 13px;
    }
    #join-section button, #chat-section button, .player-talk-btn, #accept-convo-btn, #decline-convo-btn, #end-convo-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    #join-section button:hover, #chat-section button:hover, .player-talk-btn:hover, #accept-convo-btn:hover, #decline-convo-btn:hover, #end-convo-btn:hover { background: #c23152; }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    #player-list {
      list-style: none;
      font-size: 13px;
    }
    #player-list li {
      padding: 4px 0;
      border-bottom: 1px solid #0f3460;
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .player-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-talk-btn {
      padding: 4px 10px;
      flex-shrink: 0;
    }
    .player-npc { color: #48c9b0; }
    .player-human { color: #5dade2; }
    .player-self { color: #f7dc6f; font-weight: bold; }
    #conversation-panel {
      background: #0f3460;
      border: 1px solid #533483;
      border-radius: 4px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #conversation-title {
      color: #f7dc6f;
      font-size: 13px;
      font-weight: bold;
    }
    #conversation-status, #chat-helper {
      color: #9fb0d1;
      font-size: 12px;
      line-height: 1.4;
    }
    .conversation-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .hidden {
      display: none;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
      min-height: 150px;
      max-height: 300px;
      background: #0f3460;
      padding: 8px;
      border-radius: 4px;
    }
    .chat-msg { padding: 3px 0; }
    .chat-msg .sender { font-weight: bold; color: #e94560; }
    .chat-msg .system { color: #888; font-style: italic; }
    #chat-section { display: flex; gap: 8px; }
    #chat-section input {
      flex: 1;
      background: #0f3460;
      border: 1px solid #533483;
      color: #e0e0e0;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 13px;
    }
    #inventory-panel {
      background: #0f3460;
      border: 1px solid #533483;
      border-radius: 4px;
      padding: 8px;
    }
    #inventory-panel.hidden { display: none; }
    #inventory-list {
      list-style: none;
      font-size: 13px;
    }
    #inventory-list li {
      padding: 4px 0;
      border-bottom: 1px solid #16213e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #inventory-list li:last-child { border-bottom: none; }
    .inv-item-label { color: #e0e0e0; }
    .inv-item-count { color: #9fb0d1; font-size: 12px; }
    .inv-empty { color: #666; font-style: italic; font-size: 12px; padding: 4px 0; }
    #status-bar {
      font-size: 11px;
      color: #888;
      padding: 4px 0;
      border-top: 1px solid #0f3460;
    }
    #conversation-debug-overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 32vh;
      padding: 12px;
      border: 1px solid #533483;
      border-radius: 8px;
      background: rgba(15, 52, 96, 0.94);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
      z-index: 4;
      overflow: hidden;
    }
    .conversation-debug-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .conversation-debug-title {
      color: #f7dc6f;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #conversation-debug-summary {
      color: #9fb0d1;
      font-size: 11px;
    }
    #conversation-debug-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .conversation-debug-card,
    .conversation-debug-empty {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 90px;
      padding: 10px;
      border-radius: 6px;
      background: rgba(8, 23, 43, 0.82);
      border: 1px solid #2d4f7a;
    }
    .conversation-debug-empty {
      justify-content: center;
      color: #9fb0d1;
      font-size: 12px;
      font-style: italic;
    }
    .conversation-debug-card.state-active { border-color: #e94560; }
    .conversation-debug-card.state-walking { border-color: #f7dc6f; }
    .conversation-debug-card.state-invited { border-color: #5dade2; }
    .conversation-debug-card.state-ended { border-color: #888; opacity: 0.84; }
    .conversation-debug-card-title {
      font-size: 13px;
      color: #e0e0e0;
      font-weight: bold;
    }
    .conversation-debug-card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 11px;
      color: #9fb0d1;
    }
    .conversation-debug-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(233, 69, 96, 0.18);
      color: #ffd5dc;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: 10px;
    }
    .conversation-debug-badge.state-walking {
      background: rgba(247, 220, 111, 0.18);
      color: #fff3b5;
    }
    .conversation-debug-badge.state-invited {
      background: rgba(93, 173, 226, 0.18);
      color: #d3efff;
    }
    .conversation-debug-badge.state-ended {
      background: rgba(136, 136, 136, 0.24);
      color: #dddddd;
    }
    .conversation-debug-card-preview {
      font-size: 12px;
      line-height: 1.45;
      color: #dce5f3;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="conversation-debug-overlay" class="hidden">
      <div class="conversation-debug-header">
        <div class="conversation-debug-title">Conversation Debug</div>
        <div id="conversation-debug-summary">Debug mode off</div>
      </div>
      <div id="conversation-debug-list"></div>
    </div>
  </div>
  <div id="sidebar">
    <h2>AI Town</h2>
    <div id="join-section">
      <input id="name-input" type="text" placeholder="Your name..." />
      <button id="join-btn">Join</button>
    </div>
    <div id="debug-controls">
      <label class="debug-toggle" for="conversation-debug-checkbox">
        <input id="conversation-debug-checkbox" type="checkbox" />
        <span>Conversation debug mode</span>
      </label>
    </div>
    <h2>Players</h2>
    <ul id="player-list"></ul>
    <h2>Conversation</h2>
    <div id="conversation-panel">
      <div id="conversation-title">No active conversation</div>
      <div id="conversation-status">Start a conversation from the player list to chat.</div>
      <div id="invite-actions" class="conversation-actions hidden">
        <button id="accept-convo-btn">Accept</button>
        <button id="decline-convo-btn">Decline</button>
      </div>
      <div id="active-actions" class="conversation-actions hidden">
        <button id="end-convo-btn">End conversation</button>
      </div>
    </div>
    <h2 id="inventory-header" style="cursor:pointer;">Inventory (0/10) [I]</h2>
    <div id="inventory-panel">
      <ul id="inventory-list"></ul>
    </div>
    <h2>Transcript</h2>
    <div id="chat-messages"></div>
    <div id="chat-helper">Start a conversation to chat.</div>
    <div id="chat-section">
      <input id="chat-input" type="text" placeholder="Say something..." disabled />
      <button id="chat-btn" disabled>Send</button>
    </div>
    <div id="status-bar">Connecting...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
