<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Town Debug</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --surface: #111a2e;
      --surface-raised: #162035;
      --surface-hover: #1a2744;
      --surface-selected: #1e2d4a;
      --border: rgba(148, 163, 184, 0.1);
      --border-hover: rgba(148, 163, 184, 0.2);
      --border-selected: rgba(96, 165, 250, 0.4);
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #60a5fa;
      --accent-dim: rgba(96, 165, 250, 0.12);
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.12);
      --green-border: rgba(74, 222, 128, 0.3);
      --amber: #fbbf24;
      --amber-dim: rgba(251, 191, 36, 0.1);
      --amber-border: rgba(251, 191, 36, 0.25);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.1);
      --red-border: rgba(248, 113, 113, 0.25);
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.12);
      --radius: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      --mono: "SF Mono", "Menlo", "Consolas", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* App shell */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-pill.connected {
      background: var(--green-dim);
      color: var(--green);
    }
    .status-pill.connected::before {
      background: var(--green);
    }
    .status-pill.disconnected {
      background: var(--red-dim);
      color: var(--red);
    }
    .status-pill.disconnected::before {
      background: var(--red);
    }
    .tick-pill {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .tab-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active {
      color: var(--text);
    }
    .tab-btn.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 16px;
      right: 16px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .tab-btn.active .tab-badge {
      background: var(--accent-dim);
      border-color: transparent;
      color: var(--accent);
    }

    /* Tab panels */
    .tab-panel {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .tab-panel.active { display: flex; flex-direction: column; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-input {
      flex: 1;
      height: 34px;
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: rgba(96, 165, 250, 0.4);
    }
    .filter-pills {
      display: flex;
      gap: 2px;
      background: var(--bg);
      border-radius: var(--radius);
      padding: 2px;
    }
    .filter-pill {
      height: 30px;
      padding: 0 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { color: var(--text-secondary); }
    .filter-pill.active {
      background: var(--surface-raised);
      color: var(--text);
    }

    /* Split view (master-detail) */
    .split-view {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* List pane */
    .list-pane {
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding: 8px;
    }
    .list-pane::-webkit-scrollbar { width: 6px; }
    .list-pane::-webkit-scrollbar-track { background: transparent; }
    .list-pane::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.15);
      border-radius: 3px;
    }

    /* Detail pane */
    .detail-pane {
      overflow-y: auto;
      padding: 20px 24px;
    }
    .detail-pane::-webkit-scrollbar { width: 6px; }
    .detail-pane::-webkit-scrollbar-track { background: transparent; }
    .detail-pane::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.15);
      border-radius: 3px;
    }

    /* List cards */
    .list-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.12s;
    }
    .list-card:hover {
      background: var(--surface-hover);
    }
    .list-card.selected {
      background: var(--surface-selected);
      border-color: var(--border-selected);
    }
    .list-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .list-card-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-card-meta {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-card-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    /* Card-level plan steps (NPC list) */
    .card-plan {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 4px;
      padding: 4px 0;
      border-top: 1px solid var(--border);
    }
    .card-step {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .card-step.current {
      background: var(--accent-dim);
      color: var(--text);
    }
    .card-step-num {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 14px;
    }
    .card-step.current .card-step-num { color: var(--accent); }
    .card-plan-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 0 6px 2px;
    }
    .card-plan.stale { opacity: 0.5; }
    .plan-steps.stale { opacity: 0.5; }

    /* Stalled reasons */
    .stalled-section {
      margin-bottom: 20px;
    }
    .stalled-reason {
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 6px;
    }
    .stalled-reason.warning {
      border-left: 3px solid var(--amber);
      background: var(--amber-dim);
    }
    .stalled-reason.danger {
      border-left: 3px solid var(--red);
      background: var(--red-dim);
    }
    .stalled-reason-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .stalled-reason-msg {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Plan history timeline */
    .plan-history-section {
      margin-bottom: 20px;
    }
    .plan-history-timeline {
      position: relative;
      padding-left: 18px;
    }
    .plan-history-timeline::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--border);
      border-radius: 1px;
    }
    .history-entry {
      position: relative;
      display: flex;
      gap: 12px;
      padding-bottom: 12px;
    }
    .history-entry:last-child { padding-bottom: 0; }
    .history-dot {
      position: absolute;
      left: -18px;
      top: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      background: var(--bg);
      flex-shrink: 0;
    }
    .history-entry.completed .history-dot { border-color: var(--green); background: var(--green); }
    .history-entry.failed .history-dot { border-color: var(--red); background: var(--red); }
    .history-entry.interrupted .history-dot { border-color: var(--amber); background: var(--amber); }
    .history-entry.running .history-dot { border-color: var(--accent); background: var(--accent); }
    .history-content {
      flex: 1;
      min-width: 0;
    }
    .history-header {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .history-goal {
      font-size: 13px;
      font-weight: 600;
    }
    .history-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .history-fail-reason {
      font-size: 12px;
      color: var(--red);
      margin-top: 4px;
    }
    .history-reasoning {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      font-style: italic;
    }
    .chip.completed {
      background: var(--green-dim);
      color: var(--green);
      border-color: var(--green-border);
    }
    .chip.failed {
      background: var(--red-dim);
      color: var(--red);
      border-color: var(--red-border);
    }
    .chip.interrupted {
      background: var(--amber-dim);
      color: var(--amber);
      border-color: var(--amber-border);
    }
    .chip.running {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(96, 165, 250, 0.25);
    }
    .chip.dead {
      background: rgba(100, 116, 139, 0.15);
      color: var(--text-muted);
      border-color: rgba(100, 116, 139, 0.3);
    }

    /* Clickable steps */
    .step-item.clickable, .history-step-chip.clickable {
      cursor: pointer;
    }
    .step-item.clickable:hover {
      background: var(--surface-hover);
    }

    /* History step chips */
    .history-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .history-step-chip {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-raised);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      transition: all 0.12s;
    }
    .history-step-chip:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    /* Action detail inline panel */
    .action-detail {
      margin: 6px 0 10px;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-selected);
      background: var(--surface);
    }
    .action-detail-header {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .action-detail-id {
      font-size: 11px;
      font-weight: 400;
      font-family: var(--mono);
      color: var(--text-muted);
      margin-left: 6px;
    }
    .action-detail-row {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }
    .action-field {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .action-field-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .action-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin: 10px 0 6px;
    }
    .action-predicate {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 3px;
      font-size: 12px;
      background: var(--bg);
    }
    .action-predicate.muted {
      color: var(--text-muted);
      font-style: italic;
    }
    .predicate-key {
      font-family: var(--mono);
      font-weight: 600;
      color: var(--accent);
    }
    .predicate-op {
      color: var(--text-muted);
    }
    .predicate-val {
      font-family: var(--mono);
      color: var(--green);
    }
    .predicate-desc {
      color: var(--text-muted);
      font-size: 11px;
    }
    .action-detail-empty {
      color: var(--text-muted);
      font-size: 13px;
    }
    .collapse-all-btn {
      height: 22px;
      padding: 0 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--text-secondary);
      font: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }
    .collapse-all-btn:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    /* Chips / badges */
    .chip {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-raised);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .chip.active {
      background: var(--green-dim);
      color: var(--green);
      border-color: var(--green-border);
    }
    .chip.ended {
      background: var(--surface-raised);
      color: var(--text-muted);
      border-color: var(--border);
    }
    .chip.warning {
      background: var(--amber-dim);
      color: var(--amber);
      border-color: var(--amber-border);
    }
    .chip.danger {
      background: var(--red-dim);
      color: var(--red);
      border-color: var(--red-border);
    }
    .chip.llm {
      background: var(--purple-dim);
      color: var(--purple);
      border-color: rgba(167, 139, 250, 0.25);
    }
    .chip.accent {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(96, 165, 250, 0.25);
    }

    /* Detail view */
    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 13px;
    }
    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .detail-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .detail-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Metrics grid */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }
    .metric {
      padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .metric-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .metric-value {
      font-size: 14px;
      font-weight: 600;
    }

    /* Needs bars */
    .needs-section {
      margin-bottom: 20px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .need-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .need-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      width: 50px;
      flex-shrink: 0;
    }
    .need-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }
    .need-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.3s ease;
    }
    .need-fill.good { background: var(--green); }
    .need-fill.mid { background: var(--amber); }
    .need-fill.low { background: var(--red); }
    .need-value {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text-muted);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Transcript */
    .transcript {
      border-radius: var(--radius);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .transcript-msg {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .transcript-msg:last-child { margin-bottom: 0; }
    .transcript-msg strong {
      color: var(--amber);
      font-weight: 600;
    }
    .transcript-empty {
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }

    /* Plan steps */
    .plan-steps {
      margin-bottom: 20px;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius);
      margin-bottom: 4px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .step-item.current {
      background: var(--accent-dim);
      color: var(--text);
    }
    .step-num {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 18px;
    }
    .step-item.current .step-num { color: var(--accent); }

    /* Activity tab */
    .activity-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .activity-content::-webkit-scrollbar { width: 6px; }
    .activity-content::-webkit-scrollbar-track { background: transparent; }
    .activity-content::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.15);
      border-radius: 3px;
    }
    .alert-card {
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .alert-card:hover { background: var(--surface-hover); }
    .alert-card.warning { border-left: 3px solid var(--amber); }
    .alert-card.danger { border-left: 3px solid var(--red); }
    .alert-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .alert-meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    .event-card {
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .event-card:hover { background: var(--surface-hover); }
    .event-card.warning-border { border-left: 3px solid var(--amber); }
    .event-card.error-border { border-left: 3px solid var(--red); }
    .event-title {
      font-size: 13px;
      font-weight: 500;
    }
    .event-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .section-divider {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 16px 0 8px;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 13px;
      padding: 20px;
      text-align: center;
    }

    .detail-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .inventory-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* Group header in conversation list */
    .list-group-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 12px 12px 6px;
    }
    .list-group-header:first-child {
      padding-top: 4px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .split-view {
        grid-template-columns: 1fr;
      }
      .list-pane {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-title">AI Town Debug</div>
      <div class="topbar-right">
        <span id="conn-status" class="status-pill disconnected">Disconnected</span>
        <span id="tick-display" class="tick-pill">Tick --</span>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="conversations">
        Conversations <span id="badge-convos" class="tab-badge">0</span>
      </button>
      <button class="tab-btn" data-tab="npcs">
        NPCs <span id="badge-npcs" class="tab-badge">0</span>
      </button>
      <button class="tab-btn" data-tab="activity">
        Activity <span id="badge-activity" class="tab-badge">0</span>
      </button>
    </nav>

    <!-- Conversations tab -->
    <div id="tab-conversations" class="tab-panel active">
      <div class="toolbar">
        <input id="convo-search" class="search-input" type="search" placeholder="Search conversations..." />
        <div id="convo-filters" class="filter-pills">
          <button class="filter-pill active" data-filter="all">All</button>
          <button class="filter-pill" data-filter="active">Active</button>
          <button class="filter-pill" data-filter="ended">Ended</button>
        </div>
      </div>
      <div class="split-view">
        <div id="convo-list" class="list-pane"></div>
        <div id="convo-detail" class="detail-pane"></div>
      </div>
    </div>

    <!-- NPCs tab -->
    <div id="tab-npcs" class="tab-panel">
      <div class="toolbar">
        <input id="npc-search" class="search-input" type="search" placeholder="Search NPCs..." />
      </div>
      <div class="split-view">
        <div id="npc-list" class="list-pane"></div>
        <div id="npc-detail" class="detail-pane"></div>
      </div>
    </div>

    <!-- Activity tab -->
    <div id="tab-activity" class="tab-panel">
      <div id="activity-content" class="activity-content"></div>
    </div>
  </div>

  <script type="module" src="/src/debugDashboard.ts"></script>
</body>
</html>
