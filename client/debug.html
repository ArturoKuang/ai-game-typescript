<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Town Debug</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">AI Town Debug</div>
        <div id="conn-meta" class="topbar-meta">Waiting for stream</div>
      </div>
      <div class="topbar-right">
        <span id="conn-status" class="status-pill disconnected">Disconnected</span>
        <span id="tick-display" class="tick-pill">Tick --</span>
      </div>
    </header>
    <div id="stale-banner" class="stale-banner"></div>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="conversations">
        Conversations <span id="badge-convos" class="tab-badge">0</span>
      </button>
      <button class="tab-btn" data-tab="npcs">
        NPCs <span id="badge-npcs" class="tab-badge">0</span>
      </button>
      <button class="tab-btn" data-tab="activity">
        Activity <span id="badge-activity" class="tab-badge">0</span>
      </button>
      <button class="tab-btn" data-tab="system">
        System <span id="badge-system" class="tab-badge">0</span>
      </button>
    </nav>

    <!-- Conversations tab -->
    <div id="tab-conversations" class="tab-panel active">
      <div class="toolbar">
        <input id="convo-search" class="search-input" type="search" placeholder="Search conversations..." />
        <div id="convo-filters" class="filter-pills">
          <button class="filter-pill active" data-filter="all">All</button>
          <button class="filter-pill" data-filter="active">Active</button>
          <button class="filter-pill" data-filter="ended">Ended</button>
        </div>
      </div>
      <div class="split-view">
        <div id="convo-list" class="list-pane"></div>
        <div id="convo-detail" class="detail-pane"></div>
      </div>
    </div>

    <!-- NPCs tab -->
    <div id="tab-npcs" class="tab-panel">
      <div class="toolbar">
        <input id="npc-search" class="search-input" type="search" placeholder="Search NPCs..." />
      </div>
      <div class="split-view">
        <div id="npc-list" class="list-pane"></div>
        <div id="npc-detail" class="detail-pane"></div>
      </div>
    </div>

    <!-- Activity tab -->
    <div id="tab-activity" class="tab-panel">
      <div class="toolbar-wrap">
        <div class="toolbar">
          <input id="activity-search" class="search-input" type="search" placeholder="Search alerts and events..." />
          <div id="activity-filters" class="filter-pills">
            <button class="filter-pill active" data-filter="all">All</button>
            <button class="filter-pill" data-filter="danger">Danger</button>
            <button class="filter-pill" data-filter="warning">Warning</button>
            <button class="filter-pill" data-filter="info">Info</button>
          </div>
        </div>
        <div class="toolbar-actions">
          <button id="activity-pause" class="command-btn" type="button">Pause</button>
          <button id="activity-clear-pins" class="command-btn" type="button">Clear Pins</button>
        </div>
      </div>
      <div id="activity-content" class="activity-content"></div>
    </div>

    <!-- System tab -->
    <div id="tab-system" class="tab-panel">
      <div id="system-content" class="system-content"></div>
    </div>
  </div>

  <script type="module" src="/src/debugDashboard.ts"></script>
</body>
</html>
